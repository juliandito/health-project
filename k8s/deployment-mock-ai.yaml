# Purpose: run mock-ai-service replicas for resilient triage integration testing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-ai-service
  namespace: healthcare-triage-dev
  labels:
    app: mock-ai-service
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mock-ai-service
  template:
    metadata:
      labels:
        app: mock-ai-service
        environment: dev
    spec:
      containers:
        - name: mock-ai-service
          image: ghcr.io/juliandito/health-triage/mock-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          # Allocation Justification: simulation of AI processing with moderate resource usage
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 300m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
