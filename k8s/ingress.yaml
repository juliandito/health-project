# Single external entry point for the dev cluster.
# NGINX routes auth and triage requests to the internal services below.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  namespace: healthcare-triage-dev
  labels:
    app: api-gateway
    environment: dev
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: triage.127.0.0.1.nip.io
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8001
          - path: /api/v1/triage
            pathType: Prefix
            backend:
              service:
                name: triage-engine
                port:
                  number: 8002
