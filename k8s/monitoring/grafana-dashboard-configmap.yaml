apiVersion: v1
kind: ConfigMap
metadata:
  name: health-triage-grafana-dashboard
  namespace: monitoring
data:
  healthcare-triage-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{namespace=\"healthcare-triage-dev\",ingress=\"api-gateway\"}[5m]))",
              "legendFormat": "api-gateway",
              "refId": "A"
            },
            {
              "expr": "sum(rate(auth_requests_total[5m]))",
              "legendFormat": "auth-service",
              "refId": "B"
            },
            {
              "expr": "sum(rate(triage_requests_total[5m]))",
              "legendFormat": "triage-engine",
              "refId": "C"
            },
            {
              "expr": "sum(rate(mock_ai_requests_total[5m]))",
              "legendFormat": "mock-ai-service",
              "refId": "D"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{namespace=\"healthcare-triage-dev\",ingress=\"api-gateway\"}[5m])) by (le))",
              "legendFormat": "api-gateway",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(auth_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "auth-service",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(triage_request_duration_seconds_bucket{endpoint=\"/api/v1/triage\"}[5m])) by (le))",
              "legendFormat": "triage-engine",
              "refId": "C"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(mock_ai_request_duration_seconds_bucket{endpoint=\"/api/v1/triage\"}[5m])) by (le))",
              "legendFormat": "mock-ai-service",
              "refId": "D"
            }
          ],
          "title": "P95 Latency",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "(sum(rate(nginx_ingress_controller_requests{namespace=\"healthcare-triage-dev\",ingress=\"api-gateway\",status=~\"5..\"}[5m])) / sum(rate(nginx_ingress_controller_requests{namespace=\"healthcare-triage-dev\",ingress=\"api-gateway\"}[5m]))) * 100",
              "legendFormat": "api-gateway",
              "refId": "A"
            },
            {
              "expr": "(sum(rate(auth_requests_total{status=~\"5..\"}[5m])) / sum(rate(auth_requests_total[5m]))) * 100",
              "legendFormat": "auth-service",
              "refId": "B"
            },
            {
              "expr": "(sum(rate(triage_requests_total{status=~\"5..\"}[5m])) / sum(rate(triage_requests_total[5m]))) * 100",
              "legendFormat": "triage-engine",
              "refId": "C"
            },
            {
              "expr": "(sum(rate(mock_ai_requests_total{status=~\"5..\"}[5m])) / sum(rate(mock_ai_requests_total[5m]))) * 100",
              "legendFormat": "mock-ai-service",
              "refId": "D"
            }
          ],
          "title": "Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"healthcare-triage-dev\"}[10m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Pod Restarts (10m)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "healthcare-triage"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Healthcare Triage Overview",
      "uid": "healthcare-triage-overview",
      "version": 1,
      "weekStart": ""
    }
