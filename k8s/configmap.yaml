# Purpose: provide non-sensitive runtime configuration to services.
apiVersion: v1
kind: ConfigMap
metadata:
  name: triage-platform-config
  namespace: healthcare-triage-dev
  labels:
    app.kubernetes.io/part-of: healthcare-triage
    environment: dev
data:
  TOKEN_EXPIRY_MINUTES: "60"
  AUTH_SERVICE_URL: "http://auth-service:8001"
  AI_SERVICE_URL: "http://mock-ai-service:8000"
  AI_TIMEOUT_SECONDS: "10"
  AI_MAX_RETRIES: "2"
